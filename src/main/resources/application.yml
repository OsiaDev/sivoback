server:
  port: ${PORT:8180}
  servlet:
    context-path: /sivo

spring:
  application:
    name: Sivo

  datasource:
    url: ${URL_DB}
    username: ${USER_DB}
    password: ${PASS_DB}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.protocols: TLSv1.2

acta:
  imagenes:
    base-path: ${SIVO_STORAGE_PATH:E:/archivoSiicol}
    relative-path: /sivo/actas
    max-size: 15728640
    buffer-size: 4096
  reporte:
    jasper-sub-dir: jasperReports
    nombre-archivo: actaVisitaComercial
    extension: pdf
    imagen-uno: LOGO_COLJUEGOS
    imagen-dos: logo_prosperidad_para_todos2
    check: checked
    no-check: unchecked
    inventario: actaVisitaComercial_Inventario
    novedad: actaVisitaComercial_Novedad
  notificacion:
    asunto: "Coljuegos - Acta de Visita"
    remitente: ${MAIL_SENDER:no-reply@coljuegos.gov.co}

jwt:
  secret: e3pLV3tPUUg3KiI1OFYkYj04Sn1pQl5IeTgteWdXRyhfeWU1TmU2UmNMZSM0YFM/VEtNey84TD9NPUs0dFpF
  expirationMs: 43200

aes:
  secretKey: QwErTyUiOpAsDfGh

ldap:
  url: ${LDAP_URL:ldap://coljuegos.local:389}
  domain: ${LDAP_DOMAIN:coljuegos}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never  # sin detalles para acceso público